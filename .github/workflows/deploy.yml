name: Deploy to Hub Testnet
on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'

jobs:
  deploy:
    name: Deploy Contracts
    runs-on: ubuntu-latest
    environment: testnet
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Deploy to Polkadot Hub Testnet
        run: npx hardhat run scripts/deploy.ts --network polkadot-hub-testnet
        env:
          PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          POLKADOT_HUB_TESTNET_RPC: https://testnet-passet-hub-eth-rpc.polkadot.io

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-addresses
          path: contracts/deployments/hub-testnet.json
