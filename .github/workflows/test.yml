name: Test Suite
on:
  push:
    branches: [main, 'copilot/**']
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json

      - name: Install contract dependencies
        run: npm ci

      - name: Compile smart contracts
        run: npx hardhat compile

      - name: Run contract tests
        run: npx hardhat test

      - name: Generate coverage report
        run: npx hardhat coverage

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_CHAIN_ID: 420420421
          NEXT_PUBLIC_AGENT_FACTORY_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_GUARDIAN_POLICY_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_GOVERNOR_ADDRESS: "0x0000000000000000000000000000000000000000"
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: "test"
          NEXT_PUBLIC_SUBGRAPH_URL: "https://api.studio.thegraph.com/query/0/agenthub/version/latest"
          OPENAI_API_KEY: "sk-test"
